<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
<title>Verify OTP</title>
<link rel="stylesheet" th:href="@{/css/verifyOtp.css}">
</head>

<body>

<div class="container">

<form th:action="@{/verifyOtp}" method="post" class="otp-card" autocomplete="off">

<h2>Verify OTP</h2>
<p>Enter the 4 digit OTP sent to your email</p>

<input type="hidden" name="email" th:value="${email}">

<input class="main" type="text" name="otp" placeholder="Enter OTP"
  readonly 
       onfocus="this.removeAttribute('readonly');"  required><br><br>

<button type="submit">Verify OTP</button>



</form>

</div>

</body>
</html>
