<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Settings</title>
    <link rel="stylesheet" th:href="@{/css/settings.css}">
</head>
<body>
    <h1>gfgjhhgdg</h1>

<div class="header">⚙ Settings</div>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <a th:href="@{/dashboard}">🏠 Dashboard</a>
        <a th:href="@{/profile}">👤 Profile</a>
        <a th:href="@{/settings}">⚙ Settings</a>
        <a th:href="@{/logout}">🚪 Logout</a>
    </div>

    <!-- Content -->
    <div class="content">

        <div class="settings-card">

            <h2>Account Settings</h2>

            <form th:action="@{/updateSettings}" method="post">

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" th:value="${user.fullName}" name="fullName">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" th:value="${user.email}" name="email">
                </div>

                <div class="form-group">
                    <label>Mobile</label>
                    <input type="text" th:value="${user.mobile}" name="mobile">
                </div>

                <hr>

                <h3>Change Password</h3>

                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" name="currentPassword">
                </div>

                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" name="newPassword">
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirmPassword">
                </div>

                <button type="submit" class="save-btn">💾 Save Changes</button>

            </form>
            

        </div>

    </div>

</div>

</body>
</html>
