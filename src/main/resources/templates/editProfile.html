<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Profile</title>
    <link rel="stylesheet" th:href="@{/css/editProfile.css}">
</head>
<body>

<div class="header">✏ Edit Profile</div>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <a th:href="@{/dashboard}">🏠 Dashboard</a>
        <a th:href="@{/profile}">👤 Profile</a>
        <!-- <a th:href="@{/settings}">⚙ Settings</a> -->
        <a th:href="@{/logout}">🚪 Logout</a>
    </div>

    <!-- Content -->
    <div class="content">

        <div class="form-card">

            <h2>Update Your Details</h2>

            <form th:action="@{/updateProfile}" method="post" enctype="multipart/form-data">

                <!-- Profile Image -->
                <!-- <div class="image-section">
                    <img th:src="@{/image/{id}(id=${user.id})}" class="profile-img">
                    <input type="file" name="imageFile">
                </div> -->

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="fullName" th:value="${user.fullName}" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" th:value="${user.email}" required>
                </div>

                <div class="form-group">
                    <label>Mobile</label>
                    <input type="text" name="mobile" th:value="${user.mobile}">
                </div>

                <div class="form-group">
                    <label>Education</label>
                    <input type="text" name="education" th:value="${user.education}">
                </div>

                <div class="form-group">
                    <label>City</label>
                    <input type="text" name="city" th:value="${user.city}">
                </div>

                

                <!-- Buttons -->
                <div class="buttons">
                    <button type="submit" class="save-btn">💾 Save</button>
                    <a th:href="@{/profile}" class="cancel-btn">Cancel</a>
                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
