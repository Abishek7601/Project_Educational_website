<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" th:href="@{/css/login.css}">
</head>

<body>
    




<div class="login-container">

<h2>Login</h2>

<!-- ✅ ERROR MESSAGE -->
<p th:if="${error}" th:text="${error}" style="color:red; text-align:center;"></p>

<form th:action="@{/loginUser}" method="post" autocomplete="off">

  

    <div class="form-group">
        <label><b>Username</b></label>
       <input type="text" name="username" 
       placeholder="Enter Username" 
       readonly 
       onfocus="this.removeAttribute('readonly');" required>
    </div>

    <div class="form-group">
        <label><b>Password</b></label>
       <input type="password" name="password" 
       placeholder="Enter password" 
       readonly 
       onfocus="this.removeAttribute('readonly');" required>
    </div>

    <button class="login-btn">Login</button>



<div class="extra-links">
<p><a th:href="@{#}">Forgot Password?</a></p><br>
<p>Don't have an account? <a href="#">Register</a></p><br>
<p><a th:href="@{sendOtp}">First Time Login ?</a></p>
</div>

</form>
<p th:if="${message}" th:text="${message}" 
   style="color:green; text-align:center;"></p>
<br>

<div >
    <a th:href="@{/home}" class="home-btn">⬅ Back to Home</a>
</div>
</div>

</body>
</html>
